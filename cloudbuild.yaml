steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tutor-language-platform:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tutor-language-platform:latest'
      - '.'

  # Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tutor-language-platform:$SHORT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tutor-language-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tutor-language-platform:$SHORT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/tutor-language-platform:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/tutor-language-platform:latest'
